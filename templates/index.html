<!DOCTYPE html>
<html>
<head>
    <title>Go Phish | Gayathri017</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="setup-screen" class="container">
        <h1>GO PHISH</h1>
        <div class="menu">
            <button onclick="initGame('solo')">Solo vs AI</button>
            <hr>
            <input type="text" id="room-name" placeholder="Enter Room Name">
            <button onclick="initGame('family')">Join Family Room</button>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="stats">Books - You: <span id="p-books">0</span> | AI: <span id="a-books">0</span></div>
        <div id="opponent-area" class="hand"></div>
        <div id="ocean">OCEAN (<span id="deck-size">0</span>)</div>
        <div id="player-area" class="hand"></div>
        <div class="controls">
            <p id="status-msg">Select a card to ask!</p>
            <button id="ask-btn" onclick="performAsk()" disabled>Ask Opponent</button>
        </div>
    </div>

    <script src="/static/js/game.js"></script>
</body>
</html>
